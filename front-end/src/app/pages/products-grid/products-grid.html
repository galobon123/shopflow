<mat-sidenav-container class="bg-gray-100 p-6 h-full">
    <mat-sidenav mode="side" opened="true">
        <div class="p-6">
            <h2 class="text-lg text-gray-900" >
                Categories
            </h2>

            <mat-nav-list>
                <mat-list-item class="my-2"  mat-list-item (click)="filterBy(null) " [activated]="store.selectedCategory() === null">
                    <span matListTitle [class]="null === store.selectedCategory() ? 'text-white' : null"> All</span>
                </mat-list-item>
                @for(cat of store.categories(); track cat.id){
                    <mat-list-item [activated]="cat.name === store.selectedCategory()" class="my-2" mat-list-item (click)="filterBy(cat.name)">
                        <span matListTitle class="font-medium" [class]="cat.name === store.selectedCategory() ? 'text-white' : null"> {{ cat.name }}</span>
                    </mat-list-item>
                }
            </mat-nav-list>
        </div>
    </mat-sidenav>
    <mat-sidenav-content>
        <h1 class="text-2xl font-bold text-gray-900 mb-6 ml-6">{{ store.selectedCategory() || 'All' }}</h1>
        <div class="responsive-grid">
            @for(product of store.filteredProducts(); track product.id){
                <app-product-card [product]="product" (addToCartClicked)="addToCart()">
                    <app-toggle-wishlist-button class="!absolute z-10 top-3 right-3" [product]="product"></app-toggle-wishlist-button>
                </app-product-card>
            }
        </div>
    </mat-sidenav-content>
</mat-sidenav-container>
