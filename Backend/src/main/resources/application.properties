spring.application.name=Ecommerce

# ── JWT ──────────────────────────────────────────
jwt.secret=shopflow-clave-secreta-super-larga-de-al-menos-256-bits-para-hmac-sha
jwt.expiration=86400000

# ── Base de datos ──────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/shopflow
spring.datasource.username=shopflow_user
spring.datasource.password=shopflow_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Servidor ───────────────────────────────────────────────
server.port=8080
